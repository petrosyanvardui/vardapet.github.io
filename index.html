<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VARDAPET</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    body {
      background:
        linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.55)),
        url('bg.jpg') center / cover no-repeat;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      width: min(760px, 92vw);
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 40px 28px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .monogram {
      font-size: 28px;
      letter-spacing: 0.4em;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    .logo {
      width: 100%;
      max-width: 620px;
      margin-bottom: 16px;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #fff;
      margin: 18px auto 24px;
      opacity: 0.7;
    }

    .coming {
      font-size: 28px;
      letter-spacing: 0.3em;
      font-weight: 300;
      margin-bottom: 20px;
    }

    .sub {
      font-size: 16px;
      margin: 8px 0;
      opacity: 0.9;
    }

    .contacts {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      font-size: 16px;
    }

    a {
      color: #fff;
      text-decoration: none;
    }

    a:hover {
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="card">

      <div class="monogram">VARDAPET</div>

      <img src="logo.png" class="logo"/>

      <div class="divider"></div>

      <div class="coming">COMING SOON</div>

      <div class="sub">Personal brand by Vardui Petrosyan</div>
      <div class="sub">Official website</div>

      <div class="divider"></div>

      <div class="contacts">
        <a href="mailto:petrosyanvardui@gmail.com">✉ petrosyanvardui@gmail.com</a>
        <a href="tel:+4915733273797">✆ +49 157 33273797</a>
        <a href="https://instagram.com/vardapet_" target="_blank">@vardapet_</a>
      </div>

    </div>
  </div>
</body>
</html>
