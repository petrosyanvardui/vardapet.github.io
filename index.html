<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VARDAPET</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: 'Inter', sans-serif;
      color: #fff;
      background: #000;
    }

    body {
      background:
        linear-gradient(rgba(0,0,0,0.10), rgba(0,0,0,0.32)),
        url('bg.PNG') center / cover no-repeat fixed;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      width: min(760px, 92vw);
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 30px;
      padding: 44px 30px 38px;
      text-align: center;
      backdrop-filter: blur(4px);
    }

    .topname {
      font-size: 22px;
      letter-spacing: 0.4em;
      opacity: 0.9;
      margin-bottom: 12px;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: clamp(64px, 10vw, 110px);
      font-style: italic;
      margin: 0 0 18px;
      letter-spacing: 0.02em;
    }

    .divider {
      width: 60px;
      height: 1px;
      margin: 18px auto 24px;
      background: rgba(255,255,255,0.8);
    }

    .coming {
      font-size: clamp(22px, 4vw, 32px);
      letter-spacing: 0.3em;
      font-weight: 300;
      margin-bottom: 20px;
    }

    .sub {
      font-size: 15px;
      margin: 6px 0;
      opacity: 0.9;
    }

    .contacts {
      margin-top: 26px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      font-size: 15px;
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon {
      font-size: 18px;
    }

    a {
      color: #fff;
      text-decoration: none;
    }

    a:hover {
      opacity: 0.7;
    }

    @media (max-width: 640px) {
      body {
        background-attachment: scroll;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="card">

      <div class="topname">VARDAPET</div>

      <h1 class="brand">Vardapet</h1>

      <div class="divider"></div>

      <div class="coming">COMING SOON</div>

      <div class="sub">Personal brand by Vardui Petrosyan</div>
      <div class="sub">Official website</div>

      <div class="divider"></div>

      <div class="contacts">

        <div class="contact-row">
          <span class="icon">✉</span>
          <a href="mailto:petrosyanvardui@gmail.com">petrosyanvardui@gmail.com</a>
        </div>

        <div class="contact-row">
          <span class="icon">✆</span>
          <a href="tel:+4915733273797">+49 157 33273797</a>
        </div>

        <div class="contact-row">
          <span class="icon">📷</span>
          <a href="https://instagram.com/vardapet_" target="_blank">@vardapet_</a>
        </div>

      </div>

    </div>
  </div>
</body>
</html>
