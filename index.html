<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VARDAPET</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      background: #000;
    }

    body {
      background:
        linear-gradient(rgba(0,0,0,0.08), rgba(0,0,0,0.26)),
        url('bg.PNG') center center / cover no-repeat fixed;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      width: min(760px, 92vw);
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 32px;
      padding: 34px 30px 38px;
      text-align: center;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      box-shadow: 0 18px 50px rgba(0,0,0,0.22);
    }

    .logo {
      display: block;
      width: min(430px, 82%);
      margin: 0 auto 10px;
    }

    .divider {
      width: 62px;
      height: 1px;
      margin: 16px auto 22px;
      background: rgba(255,255,255,0.82);
    }

    .coming {
      font-size: clamp(22px, 4vw, 34px);
      letter-spacing: 0.30em;
      font-weight: 300;
      margin: 0 0 18px;
    }

    .sub {
      font-size: clamp(14px, 2vw, 17px);
      margin: 0;
      opacity: 0.95;
      line-height: 1.6;
    }

    .buttons {
      margin-top: 26px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .pill {
      min-width: min(420px, 88%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 18px;
      border: 1px solid rgba(255,255,255,0.38);
      border-radius: 999px;
      text-decoration: none;
      color: #fff;
      font-size: 15px;
      letter-spacing: 0.04em;
      background: rgba(255,255,255,0.03);
      transition: all 0.25s ease;
    }

    .pill:hover {
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.75);
    }

    .pill-icon {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
      filter: invert(1);
    }

    @media (max-width: 640px) {
      body {
        background-attachment: scroll;
      }

      .card {
        padding: 28px 18px 28px;
      }

      .pill {
        min-width: 100%;
        font-size: 14px;
      }

      .logo {
        width: min(360px, 86%);
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="card">

      <img src="./logo.PNG" class="logo" alt="VARDAPET" />

      <div class="divider"></div>

      <div class="coming">COMING SOON</div>

      <p class="sub">Official website for the personal brand of Vardui Petrosyan</p>

      <div class="divider"></div>

      <div class="buttons">
        <a class="pill" href="https://instagram.com/vardapet_" target="_blank" rel="noopener noreferrer">
          <img class="pill-icon" src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg" alt="Instagram">
          <span>@vardapet_</span>
        </a>

        <a class="pill" href="mailto:petrosyanvardui@gmail.com">
          <span class="pill-icon">✉</span>
          <span>petrosyanvardui@gmail.com</span>
        </a>

        <a class="pill" href="tel:+4915733273797">
          <span class="pill-icon">✆</span>
          <span>+49 157 33273797</span>
        </a>
      </div>

    </div>
  </div>
</body>
</html>
