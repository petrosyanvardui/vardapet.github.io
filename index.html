<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VARDAPET</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #000;
    }

    .hero {
      min-height: 100vh;
      padding: 80px 20px 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      color: #ffffff;

      background-image: url('bg.PNG');
      background-size: cover;
      background-position: center;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.15), rgba(0,0,0,0.45));
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 760px;
    }

    .logo {
      width: 100%;
      max-width: 420px;
      margin: 0 auto 20px;
      display: block;
    }

    .coming {
      font-size: 0.85rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: 0.95;
    }

    .subtitle {
      font-size: 0.9rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 34px;
      opacity: 0.8;
    }

    .contacts {
      max-width: 620px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .pill {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      padding: 16px 22px;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(6px);
      color: rgba(255,255,255,0.95);
      text-decoration: none;
      font-size: 1rem;
      letter-spacing: 0.03em;
      transition: all 0.25s ease;
    }

    .pill:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.7);
      transform: translateY(-1px);
    }

    .icon {
      position: absolute;
      left: 20px;
      width: 20px;
      height: 20px;
    }

    .icon svg {
      width: 20px;
      height: 20px;
    }

    .label {
      padding: 0 24px;
    }

    @media (max-width: 768px) {
      .logo {
        max-width: 300px;
      }

      .coming {
        font-size: 0.75rem;
      }

      .subtitle {
        font-size: 0.8rem;
      }

      .pill {
        min-height: 52px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    <div class="content">

      <!-- LOGO -->
      <img src="logo.PNG" alt="VARDAPET" class="logo">

      <!-- TEXT -->
      <div class="coming">COMING SOON</div>
      <div class="subtitle">Personal brand by Vardui Petrosyan</div>

      <!-- CONTACTS -->
      <div class="contacts">

        <a href="https://instagram.com/vardapet_" target="_blank" class="pill">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="3" width="18" height="18" rx="5"></rect>
              <circle cx="12" cy="12" r="4"></circle>
              <circle cx="17.5" cy="6.5" r="1"></circle>
            </svg>
          </span>
          <span class="label">@vardapet_</span>
        </a>

        <a href="mailto:petrosyanvardui@gmail.com" class="pill">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="5" width="18" height="14" rx="4"></rect>
              <path d="M4.5 7l7.5 6 7.5-6"></path>
            </svg>
          </span>
          <span class="label">petrosyanvardui@gmail.com</span>
        </a>

        <a href="tel:+4915733273797" class="pill">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M5.5 4.5h2.8l1.8 4.4-1.9 1.5a14.8 14.8 0 0 0 5.4 5.4l1.5-1.9 4.4 1.8v2.8a2 2 0 0 1-2.2 2A17.5 17.5 0 0 1 3.5 6.7 2 2 0 0 1 5.5 4.5z"></path>
            </svg>
          </span>
          <span class="label">+49 157 33273797</span>
        </a>

      </div>

    </div>
  </section>

</body>
</html>
