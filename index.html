<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VARDAPET</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      background: #000;
    }

    body {
      background:
        linear-gradient(rgba(0,0,0,0.05), rgba(0,0,0,0.25)),
        url('bg.PNG') center / cover no-repeat fixed;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      width: min(720px, 92vw);
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 32px;
      padding: 48px 30px 42px;
      text-align: center;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .logo {
      width: min(520px, 90%);
      margin: 0 auto 20px;
      display: block;
    }

    .divider {
      width: 60px;
      height: 1px;
      margin: 20px auto 26px;
      background: rgba(255,255,255,0.7);
    }

    .coming {
      font-size: clamp(22px, 4vw, 30px);
      letter-spacing: 0.32em;
      font-weight: 300;
      margin-bottom: 18px;
    }

    .sub {
      font-size: 15px;
      margin: 6px 0;
      opacity: 0.9;
    }

    .contacts {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      color: #fff;
      text-decoration: none;
      opacity: 0.9;
    }

    .contact-row:hover {
      opacity: 0.7;
    }

    .icon {
      width: 18px;
      text-align: center;
    }

    /* INSTAGRAM BUTTON */

    .insta-btn {
      margin-top: 14px;
      padding: 10px 18px;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #fff;
      font-size: 14px;
      letter-spacing: 0.06em;
      transition: all 0.25s ease;
    }

    .insta-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: #fff;
    }

    .insta-icon {
      width: 16px;
      height: 16px;
      filter: invert(1);
    }

    @media (max-width: 640px) {
      body {
        background-attachment: scroll;
      }

      .card {
        padding: 34px 18px 28px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="card">

      <img src="./logo.PNG" class="logo" alt="VARDAPET" />

      <div class="divider"></div>

      <div class="coming">COMING SOON</div>

      <div class="sub">Personal brand by Vardui Petrosyan</div>
      <div class="sub">Official website</div>

      <div class="divider"></div>

      <div class="contacts">
        <a class="contact-row" href="mailto:petrosyanvardui@gmail.com">
          <span class="icon">✉</span>
          <span>petrosyanvardui@gmail.com</span>
        </a>

        <a class="contact-row" href="tel:+4915733273797">
          <span class="icon">✆</span>
          <span>+49 157 33273797</span>
        </a>
      </div>

      <!-- INSTAGRAM -->
      <a class="insta-btn" href="https://instagram.com/vardapet_" target="_blank">
        <img class="insta-icon" src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg">
        @vardapet_
      </a>

    </div>
  </div>
</body>
</html>
