<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VARDAPET</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    .hero {
      min-height: 100vh;
      padding: 56px 20px 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      background-image: url('bg.PNG');
      background-size: cover;
      background-position: center;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.10), rgba(0,0,0,0.38));
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 760px;
      margin-top: -70px;
    }

    .logo {
      width: 100%;
      max-width: 500px;
      display: block;
      margin: 0 auto 22px;
    }

    .coming {
      font-size: 0.86rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      margin-bottom: 10px;
      color: rgba(255,255,255,0.95);
    }

    .subtitle {
      font-size: 0.92rem;
      letter-spacing: 0.15em;
      margin-bottom: 34px;
      color: rgba(255,255,255,0.82);
      font-weight: 300;
    }

    .subtitle .by {
      opacity: 0.78;
    }

    .contacts {
      width: 100%;
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .pill {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      width: 100%;
      padding: 16px 22px;
      border: 1px solid rgba(255,255,255,0.38);
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      color: rgba(255,255,255,0.94);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.02em;
      transition: all 0.25s ease;
    }

    .pill:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.62);
      transform: translateY(-1px);
    }

    .icon {
      position: absolute;
      left: 22px;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.92);
    }

    .icon svg {
      width: 20px;
      height: 20px;
      display: block;
    }

    .label {
      display: inline-block;
      padding: 0 28px;
      text-align: center;
      word-break: break-word;
    }

    @media (max-width: 768px) {
      .hero {
        padding: 42px 16px 34px;
      }

      .content {
        margin-top: -95px;
        max-width: 92vw;
      }

      .logo {
        max-width: 390px;
        margin-bottom: 18px;
      }

      .coming {
        font-size: 0.74rem;
        letter-spacing: 0.28em;
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 0.78rem;
        letter-spacing: 0.11em;
        margin-bottom: 24px;
      }

      .contacts {
        gap: 14px;
      }

      .pill {
        min-height: 52px;
        font-size: 0.92rem;
        padding: 14px 18px;
      }

      .icon {
        left: 16px;
        width: 18px;
        height: 18px;
      }

      .icon svg {
        width: 18px;
        height: 18px;
      }

      .label {
        padding: 0 18px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="content">
      <img src="logo.PNG" alt="VARDAPET" class="logo" />

      <div class="coming">COMING SOON</div>

      <div class="subtitle">
        Personal brand <span class="by">by Vardui Petrosyan</span>
      </div>

      <div class="contacts">
        <a href="https://instagram.com/vardapet_" target="_blank" rel="noopener" class="pill">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="5"></rect>
              <circle cx="12" cy="12" r="4"></circle>
              <circle cx="17.5" cy="6.5" r="1"></circle>
            </svg>
          </span>
          <span class="label">@vardapet_</span>
        </a>

        <a href="mailto:petrosyanvardui@gmail.com" class="pill">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="5" width="18" height="14" rx="4"></rect>
              <path d="M4.5 7l7.5 6 7.5-6"></path>
            </svg>
          </span>
          <span class="label">petrosyanvardui@gmail.com</span>
        </a>

        <a href="tel:+4915733273797" class="pill">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5.5 4.5h2.8l1.8 4.4-1.9 1.5a14.8 14.8 0 0 0 5.4 5.4l1.5-1.9 4.4 1.8v2.8a2 2 0 0 1-2.2 2A17.5 17.5 0 0 1 3.5 6.7 2 2 0 0 1 5.5 4.5z"></path>
            </svg>
          </span>
          <span class="label">+49 157 33273797</span>
        </a>
      </div>
    </div>
  </section>
</body>
</html>
